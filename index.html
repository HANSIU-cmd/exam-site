<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1-9반 시험 자료 - Sample</title>
  <meta name="description" content="1-9반 시험 자료 다운로드 사이트" />

  <!-- 폰트: Pretendard 가변(variable) — styles.css의 @import로 로드 (850 굵기 사용) -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="site-header">
      <p class="site-eyebrow">EXAM ARCHIVE</p>
      <h1 class="site-title">1-9반 시험 자료</h1>
      <p class="site-subtitle">Sample</p>
      <!-- 상단 고정 링크: data.json의 topLink에서 렌더링됨 -->
      <div id="top-link" class="top-link"></div>

      <!-- AI 질문창: /api/ask 서버리스 함수를 통해 Gemini에게 질문 -->
      <form id="ask-form" class="ask-box" autocomplete="off">
        <input
          id="ask-input"
          class="ask-input"
          type="text"
          maxlength="500"
          placeholder="시험 자료에 대해 물어보세요 (예: 한국사 시험범위가 뭐야?)"
          aria-label="시험 자료 질문 입력"
        />
        <button type="submit" class="ask-submit" aria-label="질문 보내기">묻기</button>
      </form>
      <div id="ask-answer" class="ask-answer" role="status" aria-live="polite"></div>
      <button type="button" id="ask-reset" class="ask-reset" hidden>대화 초기화</button>
    </header>

    <!-- 과목별 섹션: data.json의 subjects 순서대로 렌더링됨 -->
    <main id="subjects" class="subjects" aria-live="polite">
      <p class="state-msg">불러오는 중…</p>
    </main>

    <footer class="site-footer">
      <p>Design. Crafted by HANSIU</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
